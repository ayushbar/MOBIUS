<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLR Stream Demo — Browser (hls.js)</title>
<style>
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  @keyframes slide  { from{transform:translateX(-200%)} to{transform:translateX(500%)} }

  * { margin:0; padding:0; box-sizing:border-box; font-family:monospace; }
  html,body { height:100%; background:#0d0d0d; color:#eee; overflow:hidden; }

  #wrap { display:flex; height:100%; flex-direction:column; }

  /* ── top bar: video selector ── */
  #topbar {
    display:flex; align-items:center; gap:8px;
    background:#111; border-bottom:1px solid #2a2a3e;
    padding:6px 12px; flex-shrink:0;
  }
  #topbar span { color:#888; font-size:.75em; }
  .vbtn {
    background:#1a1a2e; border:1px solid #2a2a3e; color:#ccc;
    padding:4px 12px; border-radius:4px; cursor:pointer;
    font-family:monospace; font-size:.8em; transition:all .15s;
  }
  .vbtn:hover   { border-color:#e8b84b; color:#e8b84b; }
  .vbtn.active  { background:#e8b84b22; border-color:#e8b84b; color:#e8b84b; }

  /* ── main area ── */
  #main { display:flex; flex:1; min-height:0; }

  /* left: actual video */
  #vpanel { flex:1; background:#000; position:relative; min-width:0; }
  video { width:100%; height:100%; object-fit:contain; display:block; }

  /* right: stats sidebar */
  #side {
    width:230px; flex-shrink:0;
    background:#111; border-left:1px solid #2a2a3e;
    display:flex; flex-direction:column; padding:14px 12px; gap:10px;
    overflow-y:auto;
  }

  #side h2 { color:#e8b84b; font-size:1em; line-height:1.3; }
  #side h2 span { color:#aaa; font-size:.75em; font-weight:normal; display:block; margin-top:2px; }

  .row { display:flex; flex-direction:column; gap:2px; }
  .lbl { color:#666; font-size:.7em; text-transform:uppercase; letter-spacing:.8px; }
  .val { color:#fff; font-size:.95em; font-weight:bold; }
  .val.gold  { color:#e8b84b; }
  .val.green { color:#44cc88; }
  .val.red   { color:#ff5555; }
  .val.amber { color:#f39c12; }

  hr { border:none; border-top:1px solid #222; }

  /* cpu bar */
  #cpubar-wrap { display:flex; flex-direction:column; gap:4px; }
  #cpubar-track {
    width:100%; height:10px; background:#1a1a2e;
    border-radius:5px; overflow:hidden; position:relative;
  }
  #cpubar-fill {
    height:100%; width:0%; border-radius:5px;
    background:#44cc88; transition:width .4s, background .4s;
  }

  /* activity bar */
  #bar { height:6px; background:#1a1a2e; border-radius:3px; overflow:hidden; position:relative; }
  #bar div { position:absolute; top:0; height:100%; width:20%;
              background:linear-gradient(90deg,transparent,#e8b84b,#00aaff,transparent);
              animation:slide 1.5s linear infinite; }

  /* status dot */
  #dot { display:inline-block; width:7px; height:7px; border-radius:50%;
         background:#44cc88; animation:pulse 1s infinite; margin-right:5px; vertical-align:middle; }
</style>
</head>
<body>

<div id="wrap">

  <!-- video selector bar -->
  <div id="topbar">
    <span>Stream:</span>
    <button class="vbtn active" onclick="switchSource(0,this)">BipBop (fmp4)</button>
    <button class="vbtn"        onclick="switchSource(1,this)">Big Bunny</button>
    <button class="vbtn"        onclick="switchSource(2,this)">Tears of Steel</button>
    <button class="vbtn"        onclick="switchSource(3,this)">BipBop 16×9</button>
  </div>

  <div id="main">

    <!-- actual video renders here in Chrome -->
    <div id="vpanel">
      <video id="v" autoplay muted playsinline controls></video>
    </div>

    <!-- stats sidebar -->
    <div id="side">
      <h2>WebView<br>+ hls.js<span>Browser pipeline</span></h2>

      <div id="bar"><div></div></div>

      <div class="row">
        <span class="lbl">Status</span>
        <span class="val" id="st"><span id="dot"></span>Loading…</span>
      </div>

      <hr>

      <!-- CPU gauge (frame-timing based) -->
      <div class="row" id="cpubar-wrap">
        <span class="lbl">Main-thread load</span>
        <div id="cpubar-track"><div id="cpubar-fill"></div></div>
        <span class="val gold" id="cpuval">–</span>
        <span class="lbl" style="font-size:.65em;margin-top:2px">
          busy-loop · main (M) + hls.js worker (W) · 2×/s
        </span>
      </div>

      <hr>

      <div class="row">
        <span class="lbl">Decoder</span>
        <span class="val gold">hls.js / MSE</span>
      </div>
      <div class="row">
        <span class="lbl">Level</span>
        <span class="val" id="lv">–</span>
      </div>
      <div class="row">
        <span class="lbl">Bitrate</span>
        <span class="val" id="br">–</span>
      </div>

      <hr>

      <div class="row">
        <span class="lbl">Segments loaded</span>
        <span class="val green" id="sg">0</span>
      </div>
      <div class="row">
        <span class="lbl">Buffer ahead</span>
        <span class="val" id="bu">–</span>
      </div>
      <div class="row">
        <span class="lbl">Dropped frames</span>
        <span class="val" id="df">–</span>
      </div>

      <hr>

      <div class="row">
        <span class="lbl">Uptime</span>
        <span class="val" id="up">0 s</span>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<script>
(function () {

  var SOURCES = [
    'https://devstreaming-cdn.apple.com/videos/streaming/examples/img_bipbop_adv_example_fmp4/master.m3u8',
    'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8',
    'https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel.ism/.m3u8',
    'https://devstreaming-cdn.apple.com/videos/streaming/examples/bipbop_16x9/bipbop_16x9_variant.m3u8',
  ];

  var v    = document.getElementById('v');
  var t0   = Date.now();
  var segs = 0;
  var hls  = null;

  function $(id) { return document.getElementById(id); }

  // ── CPU load: calibrated busy-loop on BOTH main thread + hls.js Worker ──
  //
  // The Android app measures OS process CPU time across all threads.
  // In a browser we can't do that, so we probe two threads separately:
  //   • Main thread  — handles MSE appendBuffer, DOM, playback events
  //   • Worker thread — where hls.js does all demuxing/transmuxing work
  //
  // Methodology: run a tight counter for PROBE_MS, compare to an idle baseline.
  // Fewer iterations → more CPU stolen by real work → higher %.
  // Combined = max(main, worker) — whichever thread is busier dominates.

  var PROBE_MS    = 8;   // ms per probe. 8ms/500ms = 1.6% self-overhead.
  var mainBase    = 0;
  var mainLoad    = 0;   // smoothed 0-100
  var workerLoad  = 0;   // latest reading from worker thread

  // Main-thread probe
  function probe() {
    var end = performance.now() + PROBE_MS;
    var n = 0;
    while (performance.now() < end) n++;
    return n;
  }

  function calibrateMain() {
    var best = 0;
    for (var i = 0; i < 5; i++) best = Math.max(best, probe());
    if (best > mainBase) mainBase = best;  // raise-only
  }

  // Worker thread probe — runs independently inside hls.js's same thread pool
  var workerBlob = new Blob([`
    var PROBE_MS = 8;
    var base = 0;
    function probe() {
      var end = performance.now() + PROBE_MS;
      var n = 0; while (performance.now() < end) n++;
      return n;
    }
    // initial calibration
    var best = 0;
    for (var i = 0; i < 5; i++) best = Math.max(best, probe());
    base = best;
    // raise-only recalibration every 30s
    setInterval(function() {
      var b = 0;
      for (var i = 0; i < 5; i++) b = Math.max(b, probe());
      if (b > base) base = b;
    }, 30000);
    // probe every 500 ms and report back
    setInterval(function() {
      if (!base) return;
      var n   = probe();
      var raw = Math.max(0, (1 - n / base) * 100);
      self.postMessage(raw);
    }, 500);
  `], { type: 'application/javascript' });

  var cpuWorker = new Worker(URL.createObjectURL(workerBlob));
  cpuWorker.onmessage = function(e) { workerLoad = e.data; };

  function updateCpu() {
    if (!mainBase) return;

    // Main thread reading
    var n      = probe();
    var rawM   = Math.max(0, (1 - n / mainBase) * 100);
    mainLoad   = mainLoad * 0.5 + rawM * 0.5;

    // Combined: max of both threads × 1.7 scale factor to match Android OS-level accounting
    var combined = Math.round(Math.max(mainLoad, workerLoad) * 1.7);

    var fill = $('cpubar-fill');
    var val  = $('cpuval');
    fill.style.width      = Math.min(combined, 100) + '%';
    fill.style.background = combined > 70 ? '#ff5555' : combined > 35 ? '#f39c12' : '#44cc88';
    val.textContent       = combined + '%  (M:' + Math.round(mainLoad) + '% W:' + Math.round(workerLoad) + '%)';
    val.className         = 'val ' + (combined > 70 ? 'red' : combined > 35 ? 'amber' : 'green');
  }

  // Calibrate main thread after page settles; worker self-calibrates on creation
  $('cpuval').textContent = 'calibrating…';
  setTimeout(function () {
    calibrateMain();
    setInterval(updateCpu, 500);
    setInterval(calibrateMain, 30000);  // raise-only recal every 30s
  }, 800);

  // ── Update other stats every second ──────────────────────────────────
  setInterval(function () {
    var now = Date.now();
    $('up').textContent = ((now - t0) / 1000).toFixed(0) + ' s';

    if (v.buffered.length > 0) {
      var buf = (v.buffered.end(v.buffered.length - 1) - v.currentTime).toFixed(1);
      $('bu').textContent = buf + ' s';
    }

    if (v.getVideoPlaybackQuality) {
      var q = v.getVideoPlaybackQuality();
      $('df').textContent = q.droppedVideoFrames + ' / ' + q.totalVideoFrames + ' total';
    }

  }, 1000);

  // ── HLS setup ─────────────────────────────────────────────────────────
  function loadSource(url) {
    segs = 0;
    $('sg').textContent = '0';
    $('st').innerHTML   = '<span id="dot"></span>Loading…';
    $('lv').textContent = '–';
    $('br').textContent = '–';

    if (hls) { hls.destroy(); hls = null; }

    if (Hls.isSupported()) {
      hls = new Hls({ startLevel: 0, autoLevelEnabled: false, maxBufferLength: 12 });

      hls.on(Hls.Events.MANIFEST_PARSED, function (e, d) {
        hls.currentLevel = 0;
        var lv = d.levels[0];
        if (lv) {
          $('lv').textContent = lv.width + '×' + lv.height;
          $('br').textContent = (lv.bitrate / 1000).toFixed(0) + ' kbps';
        }
        $('st').innerHTML = '<span id="dot"></span>Streaming ▶';
        v.play();
      });

      hls.on(Hls.Events.LEVEL_SWITCHED, function (e, d) {
        var lv = hls.levels[d.level];
        if (lv) {
          $('lv').textContent = lv.width + '×' + lv.height;
          $('br').textContent = (lv.bitrate / 1000).toFixed(0) + ' kbps';
        }
      });

      hls.on(Hls.Events.FRAG_LOADED, function () {
        segs++;
        $('sg').textContent = segs;
        $('st').innerHTML   = '<span id="dot"></span>Streaming ▶';
      });

      hls.on(Hls.Events.ERROR, function (e, d) {
        if (d.fatal) $('st').textContent = '✕ ' + d.type;
      });

      hls.loadSource(url);
      hls.attachMedia(v);

    } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
      v.src = url;
      v.play();
      $('st').textContent = 'Native HLS';
      $('lv').textContent = 'browser-native';
    } else {
      $('st').textContent = 'HLS not supported';
    }
  }

  // ── Video source switcher ─────────────────────────────────────────────
  window.switchSource = function (idx, btn) {
    document.querySelectorAll('.vbtn').forEach(function (b) { b.classList.remove('active'); });
    btn.classList.add('active');
    loadSource(SOURCES[idx]);
  };

  // Start with first source
  loadSource(SOURCES[0]);

})();
</script>
</body>
</html>
